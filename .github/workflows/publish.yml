name: Publish Docker Image

on:
  push:
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.27 or release-v0.1.27)"
        required: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .
      - run: python scripts/check_changelog.py --tag "${{ inputs.tag || github.ref_name }}"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -x --timeout=60

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set tag env
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#release-v}"
          version="${version#v}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_TAG }}
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ env.RELEASE_TAG }}"
          image="ghcr.io/${{ github.repository }}:${tag}"
          # Skip if release already exists (e.g. manual tag push)
          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag already exists, skipping"
            exit 0
          fi
          prev_tag=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            notes="$(git log "${prev_tag}..${tag}" --pretty=format:'- %h %s')"
          else
            notes="$(git log --pretty=format:'- %h %s' -n 20)"
          fi
          release_notes_file="$(mktemp)"
          {
            echo "$notes"
            echo
            echo "Docker image:"
            echo "- ${image}"
          } > "$release_notes_file"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file "$release_notes_file"
