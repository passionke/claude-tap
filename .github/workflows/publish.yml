name: Publish to PyPI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip publish]')
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Bump patch version
        id: bump
        run: |
          current=$(python3 -c "
          import re
          m = re.search(r'version = \"(.+?)\"', open('pyproject.toml').read())
          print(m.group(1))
          ")
          IFS='.' read -r major minor patch <<< "$current"
          new_version="$major.$minor.$((patch + 1))"
          sed -i "s/version = \"$current\"/version = \"$new_version\"/" pyproject.toml
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Bumped $current -> $new_version"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release v${{ steps.bump.outputs.version }} [skip publish]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
