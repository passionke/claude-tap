name: Auto Release

on:
  push:
    branches: [main]

jobs:
  auto-release:
    # Skip explicit non-release commits to avoid loops.
    if: >
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate release bot token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          if [ -z "$RELEASE_BOT_TOKEN" ]; then
            echo "::error::RELEASE_BOT_TOKEN secret is required for release automation"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Calculate next patch version
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver="${latest#v}"
            major=$(echo "$ver" | cut -d. -f1)
            minor=$(echo "$ver" | cut -d. -f2)
            patch=$(echo "$ver" | cut -d. -f3)
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Update changelog for next version
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${tag#v}"
          python scripts/update_changelog.py --version "$version"
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="release/${tag}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for $tag"
          git push --force-with-lease origin "$branch"

          pr_number="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            echo "Release changelog PR #$pr_number already exists"
          else
            pr_url="$(gh pr create \
              --base main \
              --head "$branch" \
              --title "chore: update changelog for $tag" \
              --body "Auto-generated release changelog for $tag. Auto-merge will continue the release after checks pass.")"
            pr_number="${pr_url##*/}"
          fi

          auto_merge_enabled="$(gh pr view "$pr_number" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          if [ "$auto_merge_enabled" = "true" ]; then
            gh pr merge "$pr_number" --disable-auto
          fi
          gh pr merge "$pr_number" --auto --squash --delete-branch
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.changelog.outputs.changed == 'false'
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          echo "Created tag $tag"
