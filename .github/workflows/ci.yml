name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  screenshot-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate screenshot evidence quality
        run: python scripts/check_screenshots.py docs/evidence/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Run tests (browser suites need local Playwright)
        run: >-
          python -m pytest tests/ -x --timeout=60
          --ignore=tests/test_bedrock_viewer.py
          --ignore=tests/test_search_browser.py
          --ignore=tests/test_responses_browser.py
          --ignore=tests/test_perf_viewer.py
          --ignore=tests/test_opencode_viewer.py
          --ignore=tests/test_nav_browser.py
