# Local proxy + live viewer. Mount a volume so traces survive container restarts.
# Clients: ANTHROPIC_BASE_URL=http://<host>:8080 claude
# Live UI: http://<host>:3000/?session=<claw-session-id>
#
# Copy .env.example → .env (tap-only vars; not the full claw-code stack file).
# Gateway mode: set CLAW_CLUSTER_ID + CLAW_GATEWAY_DATABASE_URL — see docs/claw-tap-gateway-mode.md
services:
  claude-tap:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "${CLAUDE_TAP_PORT:-8080}:${CLAUDE_TAP_PORT:-8080}"
      - "${CLAUDE_TAP_LIVE_PORT:-3000}:${CLAUDE_TAP_LIVE_PORT:-3000}"
    volumes:
      - ./traces:/data/traces
    command:
      - claude-tap
      - --tap-no-launch
      - --tap-host
      - "0.0.0.0"
      - --tap-target
      - "${OPENAI_BASE_URL:-https://api.openai.com}"
      - --tap-port
      - "${CLAUDE_TAP_PORT:-8080}"
      - --tap-live
      - --tap-live-port
      - "${CLAUDE_TAP_LIVE_PORT:-3000}"
      - --tap-output-dir
      - /data/traces
      - --tap-no-update-check
      - --tap-no-auto-update
    restart: unless-stopped
